<p id="nome"></p>

<button onclick="gerar()">Gerar Nome</button>

<script>

let nomes=["Lucas","Mateus","Pedro","João","Carlos","Ana","Maria","Julia","Rafael","Marcos"]

function gerar(){

let n=nomes[Math.floor(Math.random()*nomes.length)]

document.getElementById("nome").innerText=n

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/gerador-nome");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
