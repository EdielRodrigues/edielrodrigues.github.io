<script>

function gerarSenha(){

let tamanho = document.getElementById("tamanho").value;

let caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";

let senha = "";

for(let i=0;i<tamanho;i++){

senha += caracteres.charAt(Math.floor(Math.random()*caracteres.length));

}

document.getElementById("senha").innerText = senha;
<a class="voltar" href="index.html">← Voltar</a>
}

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const firebaseConfig = {

messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/geradorSenha");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;

uso++;

set(ferramentaRef,uso);

});

</script>
