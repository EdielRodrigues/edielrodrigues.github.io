<div id="cor"></div>

<div class="info">
<p id="hex">HEX: #000000</p>
<p id="rgb">RGB: 0,0,0</p>
<p id="nome">Nome: Preto</p>
</div>

<button onclick="gerar()">Gerar Cor</button>

<script>

const nomesCores={
"#FF0000":"Vermelho",
"#00FF00":"Verde",
"#0000FF":"Azul",
"#FFFF00":"Amarelo",
"#FFA500":"Laranja",
"#800080":"Roxo",
"#FFC0CB":"Rosa",
"#000000":"Preto",
"#FFFFFF":"Branco",
"#808080":"Cinza"
}

function gerar(){

let letras="0123456789ABCDEF"

let cor="#"

for(let i=0;i<6;i++){

cor+=letras[Math.floor(Math.random()*16)]

}

document.getElementById("cor").style.background=cor

document.getElementById("hex").innerText="HEX: "+cor

let r=parseInt(cor.substring(1,3),16)
let g=parseInt(cor.substring(3,5),16)
let b=parseInt(cor.substring(5,7),16)

document.getElementById("rgb").innerText="RGB: "+r+","+g+","+b

let nome=nomesCores[cor] || "Cor personalizada"

document.getElementById("nome").innerText="Nome: "+nome

}

gerar()

</script>
  
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/gerador-cor");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
