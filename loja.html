<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-3707008419271765">

crossorigin="anonymous"></script>

<title>Loja Online</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
border-radius:6px;
border:none;
}

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
}

.categorias button{
padding:8px 15px;
border:none;
background:#1e88e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.card button{
margin-top:8px;
padding:8px;
border:none;
border-radius:6px;
background:#ee4d2d;
color:white;
cursor:pointer;
}

.carrinho{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow:auto;
}

.carrinho.ativo{
right:0;
}

.botaoCarrinho{
position:fixed;
right:20px;
bottom:20px;
background:#ee4d2d;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🛒 Loja</h2>
<!-- ANUNCIO -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-3707008419271765"
data-ad-slot="2879308857"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
  
<input type="text" id="busca" placeholder="Buscar">

</header>

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('eletronicos')">Eletrônicos</button>
<button onclick="filtrar('games')">Games</button>
<button onclick="filtrar('acessorios')">Acessórios</button>

</div>

<div class="produtos" id="produtos"></div>

<div class="carrinho">

<h3>🛒 Carrinho</h3>

<div id="listaCarrinho"></div>

</div>

<button class="botaoCarrinho" onclick="abrirCarrinho()">🛒</button>

<script>

let produtos=[];
let carrinho=[];

let categorias=["eletronicos","games","acessorios"];

for(let i=1;i<=120;i++){

let cat=categorias[Math.floor(Math.random()*categorias.length)];

produtos.push({

nome:"Produto "+i,
categoria:cat,
img:"https://picsum.photos/200?random="+i,
link:"https://br.shp.ee/uVosRBAm"

});

}

function mostrar(lista){

let area=document.getElementById("produtos");

area.innerHTML="";

lista.forEach(p=>{

area.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nome}</h3>

<p>${p.categoria}</p>

<button onclick="addCarrinho('${p.nome}')">Adicionar</button>

<a target="_blank" href="${p.link}">
<button>Comprar</button>
</a>

</div>

`;

});

}

mostrar(produtos);

function filtrar(cat){

if(cat==="todos"){

mostrar(produtos);

}else{

let filtro=produtos.filter(p=>p.categoria===cat);

mostrar(filtro);

}

}

document.getElementById("busca").addEventListener("keyup",function(){

let texto=this.value.toLowerCase();

let filtro=produtos.filter(p=>p.nome.toLowerCase().includes(texto));

mostrar(filtro);

});

function addCarrinho(nome){

carrinho.push(nome);

let lista=document.getElementById("listaCarrinho");

lista.innerHTML="";

carrinho.forEach(item=>{

lista.innerHTML+="<p>"+item+"</p>";

});

}

function abrirCarrinho(){

document.querySelector(".carrinho").classList.toggle("ativo");

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/loja");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
  
</body>

</html>
