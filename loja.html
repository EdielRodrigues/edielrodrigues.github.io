<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja Online</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:10px;
width:200px;
border-radius:6px;
border:none;
}

.categorias{
display:flex;
gap:10px;
padding:15px;
justify-content:center;
flex-wrap:wrap;
}

.categorias button{
padding:8px 15px;
border:none;
background:#1e88e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.card button{
margin-top:10px;
padding:8px;
background:#ee4d2d;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.carrinho{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
}

</style>

</head>

<body>

<header>

<h2>🛒 Loja</h2>

<input type="text" id="busca" placeholder="Buscar produto">

</header>

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('eletronicos')">Eletrônicos</button>
<button onclick="filtrar('games')">Games</button>
<button onclick="filtrar('acessorios')">Acessórios</button>

</div>

<div class="produtos" id="produtos"></div>

<div class="carrinho">

<h3>🛒 Carrinho</h3>

<div id="listaCarrinho"></div>

</div>

<script>

let produtos = [];
let carrinho = [];

let categorias = ["eletronicos","games","acessorios"];

for(let i=1;i<=120;i++){

let cat = categorias[Math.floor(Math.random()*categorias.length)];

produtos.push({

nome:"Produto "+i,
categoria:cat,
img:"https://picsum.photos/200?random="+i,
link:"https://shopee.com.br"

});

}

function mostrar(lista){

let area=document.getElementById("produtos");

area.innerHTML="";

lista.forEach(p=>{

area.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nome}</h3>

<p>${p.categoria}</p>

<button onclick="addCarrinho('${p.nome}')">Adicionar</button>

<a target="_blank" href="${p.link}">
<button>Comprar</button>
</a>

</div>

`;

});

}

mostrar(produtos);

function filtrar(cat){

if(cat==="todos"){

mostrar(produtos);

}else{

let filtro=produtos.filter(p=>p.categoria===cat);

mostrar(filtro);

}

}

document.getElementById("busca").addEventListener("keyup",function(){

let texto=this.value.toLowerCase();

let filtro=produtos.filter(p=>p.nome.toLowerCase().includes(texto));

mostrar(filtro);

});

function addCarrinho(nome){

carrinho.push(nome);

let lista=document.getElementById("listaCarrinho");

lista.innerHTML="";

carrinho.forEach(item=>{

lista.innerHTML+="<p>"+item+"</p>";

});

}

</script>

</body>
</html>
