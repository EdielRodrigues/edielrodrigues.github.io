<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu App Shopee</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

header{
background:#ee4d2d;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
padding-bottom:70px;
}

.show{
display:block;
}

.card{
background:#1c1c1c;
padding:15px;
margin:10px 0;
border-radius:12px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#ee4d2d;
color:#fff;
font-size:16px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
}

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1c1c1c;
}

nav button{
flex:1;
background:none;
color:#fff;
padding:12px;
}

.active{
background:#ee4d2d;
}
</style>
</head>

<body>

<header>🔥 Ganhe com Shopee</header>

<!-- HOME -->
<div id="home" class="page show">
<div class="card">
<h3>🛒 Ofertas do Dia</h3>
<p>Clique abaixo e veja produtos com desconto 👇</p>
<button onclick="abrirVitrine()">🔥 Ver Ofertas</button>
</div>
</div>

<!-- PAINEL -->
<div id="painel" class="page">
<div class="card">
<h3>📊 Seus dados</h3>
<p>Cliques: <span id="cliques">0</span></p>
<p>Ganhos estimados: R$ <span id="ganhos">0.00</span></p>
</div>
</div>

<!-- AFILIADO -->
<div id="afiliado" class="page">
<div class="card">
<h3>👥 Seu link</h3>
<input id="linkAfiliado">
<button onclick="copiar()">Copiar Link</button>
</div>
</div>

<nav>
<button onclick="trocar('home')" class="active">Oferta</button>
<button onclick="trocar('painel')">Painel</button>
<button onclick="trocar('afiliado')">Afiliado</button>
</nav>

<script>
// 🔥 COLE SEU LINK AQUI
const SUA_VITRINE = "https://collshp.com/edielrodrigues40854?view=storefront";

// USUÁRIO
let user = localStorage.getItem("user");
if(!user){
user = "user_" + Math.random().toString(36).substring(2);
localStorage.setItem("user", user);
}

// REFERÊNCIA
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
if(ref){
localStorage.setItem("ref", ref);
}

// LINK AFILIADO
const link = window.location.origin + window.location.pathname + "?ref=" + user;
document.getElementById("linkAfiliado").value = link;

// DADOS
let cliques = localStorage.getItem("cliques") || 0;
let ganhos = localStorage.getItem("ganhos") || 0;

document.getElementById("cliques").innerText = cliques;
document.getElementById("ganhos").innerText = ganhos;

// ABRIR VITRINE
function abrirVitrine(){
cliques++;
localStorage.setItem("cliques", cliques);

ganhos = (cliques * 0.30).toFixed(2);
localStorage.setItem("ganhos", ganhos);

window.location.href = SUA_VITRINE;
}

// TROCAR TELA
function trocar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("show"));
document.getElementById(p).classList.add("show");

document.querySelectorAll("nav button").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
}

// COPIAR
function copiar(){
const input = document.getElementById("linkAfiliado");
input.select();
document.execCommand("copy");
alert("Link copiado!");
}
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/Shopee-Loja");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
  
</body>
</html>
