<title>Gerador de QR Code</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;text-align:center;padding:40px}
input{padding:10px;width:250px}
button{padding:10px;margin-top:10px}

<body>

<h1>🔲 Gerador de QR Code</h1>

<!-- ANUNCIO -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-3707008419271765"
data-ad-slot="2879308857"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<input id="texto" placeholder="Digite texto ou link">

<br>

<button onclick="gerar()">Gerar</button>

<div id="qr"></div>

<script>

function gerar(){

let texto=document.getElementById("texto").value

let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(texto)

document.getElementById("qr").innerHTML="<img src='"+url+"'>"

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/qr-code");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
  
</body>
