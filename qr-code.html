<h1>🔲 Gerador de QR Code</h1>

<!-- ANUNCIO -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-3707008419271765"
data-ad-slot="2879308857"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<input id="texto" placeholder="Digite texto ou link">

<br>

<button onclick="gerar()">Gerar</button>

<div id="qr"></div>

<script>

function gerar(){

let texto=document.getElementById("texto").value

let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(texto)

document.getElementById("qr").innerHTML="<img src='"+url+"'>"

}

</script>

</body>
