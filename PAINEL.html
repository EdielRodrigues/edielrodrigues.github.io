<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Localizações</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#map{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain:"ferramentas-projeto.firebaseapp.com",
databaseURL:"https://ferramentas-projeto.firebaseio.com/",
projectId:"ferramentas-projeto",
storageBucket:"ferramentas-projeto.appspot.com",
messagingSenderId:"877191590019",
appId:"1:877191590019:web:152d4d35bdd3024c53abb6"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let map;
let markers = {};
let rotas = {};

window.initMap=function(){

map=new google.maps.Map(document.getElementById("map"),{

zoom:6,
center:{lat:-18,lng:-49}

});

onValue(ref(db,"localizacoes"),snapshot=>{

let dados=snapshot.val();

if(!dados) return;

for(let id in dados){

let l=dados[id];

let lat=l.latitude;
let lng=l.longitude;

if(!markers[id]){

let marker=new google.maps.Marker({

position:{lat:lat,lng:lng},
map:map

});

markers[id]=marker;

/* criar rota */

rotas[id]=new google.maps.Polyline({

path:[{lat:lat,lng:lng}],
geodesic:true,
strokeColor:"#00ff9d",
strokeOpacity:1,
strokeWeight:3,
map:map

});

/* janela info */

let info=new google.maps.InfoWindow();

marker.addListener("click",()=>{

info.setContent(
"<div style='background:#0f0f0f;color:white;padding:10px;border-radius:6px'>"+
"<b>Cidade:</b> "+l.cidade+"<br>"+
"<b>País:</b> "+l.pais+"<br>"+
"<b>IP:</b> "+l.ip+"<br>"+
"<b>Celular:</b> "+l.celular+
"</div>"
);

info.open(map,marker);

});

}else{

markers[id].setPosition({lat:lat,lng:lng});

/* atualizar linha */

let caminho = rotas[id].getPath();
caminho.push(new google.maps.LatLng(lat,lng));

}

}

});

}

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA56xoogq9DtYtk-qWOr8zhswUgRd2LVWs&callback=initMap"></script>

</body>
</html>
