<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Localizações</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#map{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain:"ferramentas-projeto.firebaseapp.com",
databaseURL:"https://ferramentas-projeto.firebaseio.com/",
projectId:"ferramentas-projeto",
storageBucket:"ferramentas-projeto.appspot.com",
messagingSenderId:"877191590019",
appId:"1:877191590019:web:152d4d35bdd3024c53abb6"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let map;
let markers={};

window.initMap=function(){

map=new google.maps.Map(document.getElementById("map"),{

zoom:5,
center:{lat:-15,lng:-55}

});

}

/* pegar todas localizações */

onValue(ref(db,"localizacoes"),snapshot=>{

let dados=snapshot.val();

for(let id in dados){

let l=dados[id];

let lat=l.latitude;
let lng=l.longitude;

if(!markers[id]){

markers[id]=new google.maps.Marker({

position:{lat:lat,lng:lng},
map:map

});

}else{

markers[id].setPosition({lat:lat,lng:lng});

}

let info = new google.maps.InfoWindow();

markers[id].addListener("click",()=>{

info.setContent(`

<b>Cidade:</b> ${l.cidade || "desconhecido"}<br>
<b>País:</b> ${l.pais || "desconhecido"}<br>
<b>IP:</b> ${l.ip || "desconhecido"}<br>
<b>Celular:</b> ${l.celular || "desconhecido"}

`);

info.open(map,markers[id]);

});

markers[id].addListener("click",()=>{

info.open(map,markers[id])

});

}

});

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA56xoogq9DtYtk-qWOr8zhswUgRd2LVWs&callback=initMap"></script>

</body>
</html>
