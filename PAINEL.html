<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Rastreamento</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
}

#map{
width:100%;
height:100vh;
}

</style>
</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain:"ferramentas-projeto.firebaseapp.com",
databaseURL:"https://ferramentas-projeto.firebaseio.com/",
projectId:"ferramentas-projeto",
storageBucket:"ferramentas-projeto.appspot.com",
messagingSenderId:"877191590019",
appId:"1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let map;
let markers = {};
let rotas = {};

window.initMap=function(){

map = new google.maps.Map(document.getElementById("map"),{
zoom:5,
center:{lat:-15,lng:-55}
});

onValue(ref(db,"usuarios"),snapshot=>{

let dados=snapshot.val();

for(let id in dados){

let u=dados[id];

let lat=u.latitude;
let lng=u.longitude;

/* verificar status */

let agora = Date.now();
let diferenca = agora - u.data;

let status = "🟢 Online";

if(diferenca > 15000){
status = "🔴 Offline";
}

if(!markers[id]){

markers[id]=new google.maps.Marker({
position:{lat:lat,lng:lng},
map:map
});

/* rota */

rotas[id]=new google.maps.Polyline({
path:[{lat:lat,lng:lng}],
geodesic:true,
strokeColor:"#00ff9d",
strokeOpacity:1,
strokeWeight:3,
map:map
});

let info=new google.maps.InfoWindow();

markers[id].addListener("click",()=>{

info.setContent(
"<div style='background:#111;color:white;padding:10px'>"+
status+"<br>"+
"🔋 Bateria: "+u.bateria+"<br>"+
"📶 Rede: "+u.rede+"<br>"+
"📱 "+u.celular+
"</div>"
);

info.open(map,markers[id]);

});

}else{

markers[id].setPosition({lat:lat,lng:lng});

/* atualizar linha */

let caminho=rotas[id].getPath();
caminho.push(new google.maps.LatLng(lat,lng));

}

}

});

}

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA56xoogq9DtYtk-qWOr8zhswUgRd2LVWs&callback=initMap"></script>

</body>
</html>
