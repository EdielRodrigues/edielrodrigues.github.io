<input id="cpf">

<br><br>

<button onclick="gerar()">Gerar CPF</button>

<script>

function gerar(){

let n=[]

for(let i=0;i<9;i++){

n.push(Math.floor(Math.random()*9))

}

let d1=0

for(let i=0;i<9;i++){

d1+=n[i]*(10-i)

}

d1=11-(d1%11)

if(d1>=10)d1=0

n.push(d1)

let d2=0

for(let i=0;i<10;i++){

d2+=n[i]*(11-i)

}

d2=11-(d2%11)

if(d2>=10)d2=0

n.push(d2)

document.getElementById("cpf").value=n.join("")

}

</script>

});
