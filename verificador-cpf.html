<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificador de CPF</title>
</head>

<body>

<h1>Verificador de CPF</h1>

<input id="cpf" placeholder="Digite o CPF">
<button onclick="verificar()">Verificar</button>

<p id="resultado"></p>

<script>

function verificar(){

let cpf = document.getElementById("cpf").value.replace(/\D/g,'')

if(cpf.length != 11){
resultado.innerText="CPF inválido"
return
}

let soma=0
let resto

for(let i=1;i<=9;i++)
soma += parseInt(cpf.substring(i-1,i))*(11-i)

resto=(soma*10)%11

if(resto==10||resto==11)
resto=0

if(resto!=parseInt(cpf.substring(9,10))){
resultado.innerText="CPF inválido"
return
}

resultado.innerText="CPF válido"

}

</script>

</body>
</html>
