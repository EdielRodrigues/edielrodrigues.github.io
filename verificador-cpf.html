<body>

<div class="container">

<h1>Verificador de CPF</h1>

<input id="cpf" placeholder="Digite o CPF">

<button onclick="verificar()">Verificar CPF</button>

<p id="resultado" class="resultado"></p>


</div>

<script>

function verificar(){

let cpf=document.getElementById("cpf").value.replace(/\D/g,'')

if(cpf.length!=11){
document.getElementById("resultado").innerText="CPF inválido"
return
}

let soma=0
let resto

for(let i=1;i<=9;i++)
soma+=parseInt(cpf.substring(i-1,i))*(11-i)

resto=(soma*10)%11

if(resto==10||resto==11)
resto=0

if(resto!=parseInt(cpf.substring(9,10))){
document.getElementById("resultado").innerText="CPF inválido"
return
}

document.getElementById("resultado").innerText="CPF válido"

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/verificador-cpf");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
