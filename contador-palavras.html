<textarea id="texto" onkeyup="contar()"></textarea>

<p id="resultado">0 palavras</p>

<script>

function contar(){

let texto=document.getElementById("texto").value.trim()

let palavras=texto.split(/\s+/).filter(Boolean)

document.getElementById("resultado").innerText=palavras.length+" palavras"

}

</script>
