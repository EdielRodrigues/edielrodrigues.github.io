<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contador de Caracteres</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;text-align:center;padding:40px}
textarea{width:300px;height:120px}
</style>

</head>

<body>

<h1>📊 Contador de Caracteres</h1>

<textarea id="texto" onkeyup="contar()"></textarea>

<p id="total">0 caracteres</p>

<script>

function contar(){

let t=document.getElementById("texto").value.length

document.getElementById("total").innerText=t+" caracteres"

}

</script>

</body>
</html>
