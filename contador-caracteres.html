<h1>📊 Contador de Caracteres</h1>

<!-- ANUNCIO -->
<ins class="adsbygoogle"
style="display:block"

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<textarea id="texto" onkeyup="contar()"></textarea>

<p id="total">0 caracteres</p>

<script>

function contar(){

let t=document.getElementById("texto").value.length

document.getElementById("total").innerText=t+" caracteres"

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/contador-caracteres");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>

</body>
