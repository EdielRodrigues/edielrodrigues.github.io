<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Rastreador</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#071a26;
color:white;
text-align:center;
}

#map{
width:100%;
height:50vh;
}

#dashboard{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

.card{
background:#0d2633;
padding:10px;
border-radius:8px;
width:120px;
}

#painel{
padding:10px;
}

.usuario{
background:#111;
margin:10px auto;
padding:10px;
border-radius:8px;
width:90%;
}

#radar{
position:absolute;
top:50%;
left:50%;
width:250px;
height:250px;
border-radius:50%;
border:2px solid #00ff9d;
transform:translate(-50%,-50%);
animation:radar 4s linear infinite;
pointer-events:none;
}

@keyframes radar{
0%{transform:translate(-50%,-50%) rotate(0deg)}
100%{transform:translate(-50%,-50%) rotate(360deg)}
}

</style>

</head>

<body>

<div id="map"></div>

<div id="radar"></div>

<div id="dashboard">

<div class="card">
👥 Usuários<br>
<span id="total">0</span>
</div>

<div class="card">
🚗 Movimento<br>
<span id="movimento">0</span>
</div>

</div>

<canvas id="grafico"></canvas>

<div id="painel"></div>

<script>

let map
let markers={}
let linhas={}

let area={
lat:-18,
lng:-49,
raio:3000
}

let chart

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

zoom:4,
center:{lat:-15,lng:-55},

styles:[
{elementType:"geometry",stylers:[{color:"#071a26"}]},
{elementType:"labels.text.fill",stylers:[{color:"#00ff9d"}]},
{featureType:"water",stylers:[{color:"#021017"}]}
]

})

let ctx=document.getElementById("grafico")

chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Movimento",
data:[],
borderColor:"#00ff9d"
}]
}
})

carregarUsuarios()

}

function verificarArea(lat,lng){

let dist=google.maps.geometry.spherical.computeDistanceBetween(

new google.maps.LatLng(lat,lng),
new google.maps.LatLng(area.lat,area.lng)

)

if(dist>area.raio){

alert("🚨 Usuário saiu da área")

}

}

function identificarDevice(ua){

if(ua.includes("Android")) return "Android"
if(ua.includes("iPhone")) return "iPhone"
if(ua.includes("Windows")) return "PC"

return "Desconhecido"

}

function carregarUsuarios(){

import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then(firebase=>{

import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js").then(firebaseDB=>{

const { initializeApp } = firebase
const { getDatabase, ref, onValue } = firebaseDB

const firebaseConfig = {

apiKey:"AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain:"ferramentas-projeto.firebaseapp.com",
databaseURL:"https://ferramentas-projeto.firebaseio.com/",
projectId:"ferramentas-projeto",
storageBucket:"ferramentas-projeto.appspot.com",
messagingSenderId:"877191590019",
appId:"1:877191590019:web:152d4d35bdd3024c53abb6"

}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

onValue(ref(db,"usuarios"),snapshot=>{

let dados=snapshot.val()

let painel=document.getElementById("painel")

painel.innerHTML=""

let total=0
let movimento=0

for(let id in dados){

let u=dados[id]

let lat=u.latitude
let lng=u.longitude

total++

verificarArea(lat,lng)

if(!markers[id]){

markers[id]=new google.maps.Marker({

position:{lat:lat,lng:lng},
map:map,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:8,
fillColor:"#00ff9d",
fillOpacity:1,
strokeWeight:2
}

})

linhas[id]=new google.maps.Polyline({

path:[{lat:lat,lng:lng}],
geodesic:true,
strokeColor:"#00ff9d",
strokeWeight:3,
map:map

})

}else{

markers[id].setPosition({lat:lat,lng:lng})

let path=linhas[id].getPath()
path.push(new google.maps.LatLng(lat,lng))

}

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(lat)
chart.update()

let modelo=identificarDevice(u.device)

painel.innerHTML+=`

<div class="usuario">

👤 ${id}<br>
📱 ${modelo}<br>
🔋 ${u.bateria}<br>
📶 ${u.conexao}

</div>

`

}

document.getElementById("total").innerText=total
document.getElementById("movimento").innerText=movimento

})

})

})

}

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA56xoogq9DtYtk-qWOr8zhswUgRd2LVWs&libraries=geometry&callback=initMap"></script>

</body>
</html>
