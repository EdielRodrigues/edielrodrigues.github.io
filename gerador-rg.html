<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Gerador de RG</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
width:90%;
max-width:500px;
}

h1{
font-size:34px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
font-size:20px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2196f3;
color:white;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

.resultado{
margin-top:25px;
font-size:26px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Gerador de RG</h1>

<button onclick="gerar()">Gerar RG</button>

<p id="rg" class="resultado"></p>

</div>

<script>

function gerar(){

let rg=""

for(let i=0;i<9;i++){
rg += Math.floor(Math.random()*10)
}

document.getElementById("rg").innerText = rg

}

</script>

</body>

</html>
