<h1>📱 Gerar Link WhatsApp</h1>

<!-- ANUNCIO -->

<input id="tel" placeholder="Telefone">

<input id="msg" placeholder="Mensagem">

<br>

<button onclick="gerar()">Gerar link</button>

<input id="link">

<script>

function gerar(){

let tel=document.getElementById("tel").value

let msg=document.getElementById("msg").value

let link="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

document.getElementById("link").value=link

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",
authDomain: "ferramentas-projeto.firebaseapp.com",
databaseURL: "https://ferramentas-projeto.firebaseio.com/",
projectId: "ferramentas-projeto",
storageBucket: "ferramentas-projeto.appspot.com",
messagingSenderId: "877191590019",
appId: "1:877191590019:web:152d4d35bdd3024c53abb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ferramentaRef = ref(db,"ferramentas/link-whatsapp");

get(ferramentaRef).then((snapshot)=>{

let uso = snapshot.val() || 0;
uso++;

set(ferramentaRef,uso);

});

</script>
